name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: cd FS-9/frontend && npm install
      - name: Build
        run: cd FS-9/frontend && npm run build
      - name: Deploy to Firebase
        if: env.FIREBASE_SECRET != ''
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: fs-exp-9

  deploy-backend:
    runs-on: ubuntu-latest
    env:
      AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        if: env.AWS_KEY != ''
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create ECR Repository if not exists
        if: env.AWS_KEY != ''
        run: |
          aws ecr describe-repositories --repository-names fs9-backend || aws ecr create-repository --repository-name fs9-backend

      - name: Login to Amazon ECR
        if: env.AWS_KEY != ''
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        if: env.AWS_KEY != ''
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: fs9-backend
          IMAGE_TAG: latest
        run: |
          cd FS-9/backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2
        if: env.EC2_HOST != ''
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry || 'unknown' }}
            docker pull ${{ steps.login-ecr.outputs.registry }}/fs9-backend:latest
            docker stop fs9-backend-1 || true
            docker stop fs9-backend-2 || true
            docker rm fs9-backend-1 || true
            docker rm fs9-backend-2 || true
            docker run -d --name fs9-backend-1 -p 5001:5000 ${{ steps.login-ecr.outputs.registry }}/fs9-backend:latest
            docker run -d --name fs9-backend-2 -p 5002:5000 ${{ steps.login-ecr.outputs.registry }}/fs9-backend:latest
